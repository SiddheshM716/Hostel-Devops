name: Deploy to Production Kubernetes

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hostel_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_USER: postgres
      DB_PASSWORD: password
      DB_HOST: localhost
      DB_NAME: hostel_db
      DB_PORT: 5432
      JWT_SECRET: supersecretkey123
      PORT: 5001

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Initialize Database
        env:
          PGPASSWORD: password
        run: |
          sudo apt-get install -y postgresql-client
          psql -h localhost -U postgres -d hostel_db -f schema.sql
          psql -h localhost -U postgres -d hostel_db -f seed_new.sql

      - name: Backend Tests (Jest)
        working-directory: ./backend
        run: |
          npm ci
          npm test -- --maxWorkers=2 --forceExit

      - name: Frontend Tests (Cypress)
        run: |
          cd backend && npm ci && npm start &
          npx wait-on tcp:localhost:5001 || echo "Wait on backend didn't throw"
          npm ci
          npm run dev &
          npx wait-on http://localhost:5173
          npx cypress run --headless --browser chrome

      - name: Log in to Docker Hub
        if: success()
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        if: success()
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hostelmate-backend:latest

      - name: Build and Push Frontend Image
        if: success()
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hostelmate-frontend:latest

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Kubernetes Rollout via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            kubectl rollout restart deployment/backend
            kubectl rollout restart deployment/frontend
            kubectl rollout status deployment/backend --timeout=120s
            kubectl rollout status deployment/frontend --timeout=120s
