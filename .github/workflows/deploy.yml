name: Deploy to Production Kubernetes

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Backend Tests (Jest)
        working-directory: ./backend
        run: |
          npm ci
          npm test -- --maxWorkers=2 --forceExit

      - name: Frontend Tests (Cypress)
        run: |
          npm ci
          npm run dev &
          npx wait-on http://localhost:5173
          npx cypress run --headless --browser chrome

      - name: Log in to Docker Hub
        if: success()
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        if: success()
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hostelmate-backend:latest

      - name: Build and Push Frontend Image
        if: success()
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hostelmate-frontend:latest

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Kubernetes Rollout via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            kubectl rollout restart deployment/backend
            kubectl rollout restart deployment/frontend
            kubectl rollout status deployment/backend --timeout=120s
            kubectl rollout status deployment/frontend --timeout=120s
