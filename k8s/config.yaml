apiVersion: v1
kind: ConfigMap
metadata:
  name: hostelmate-config
data:
  PORT: "5001"
  DB_HOST: "postgres-svc"
  DB_PORT: "5432"
  DB_NAME: "hostel_db"
  DB_USER: "postgres"
